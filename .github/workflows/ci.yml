name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - name: ruff check
        run: ruff check src tests
      # ruff-format is rolled out file-by-file in Phase 5 (P5.9). Until then
      # the format check runs as informational only — never blocks CI.
      - name: ruff format check (informational)
        continue-on-error: true
        run: ruff format --check src tests

  test:
    name: Test (Py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - name: Run pytest
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term \
            -ra
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  smoke:
    name: CLI smoke test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
      - name: vbalidator --help
        run: vbalidator --help
      - name: vbalidator on demo fixtures (expects non-zero, demo has known errors)
        run: |
          set +e
          vbalidator tests/demo --output /tmp/report.json --quiet
          ec=$?
          # Demo intentionally contains errors → non-zero exit is correct.
          if [ "$ec" -eq 0 ]; then
            echo "Expected non-zero exit on tests/demo (known errors), got 0" >&2
            exit 1
          fi
      - name: Validate JSON v2 report shape
        run: |
          python -c "
          import json
          d = json.load(open('/tmp/report.json'))
          assert d['version'] == '2.0', d['version']
          assert 'summary' in d and 'score' in d['summary']
          assert 'files' in d and 'issues' in d
          assert isinstance(d['summary']['score'], int)
          print(f\"v2 OK: score={d['summary']['score']}, issues={len(d['issues'])}\")
          "
      - name: vbalidator on a clean valid sample (expects zero exit + score 100)
        run: |
          vbalidator tests/samples/valid_code/valid_sample.bas \
            --output /tmp/clean.json --quiet --no-strict
          python -c "
          import json
          d = json.load(open('/tmp/clean.json'))
          assert d['summary']['compile_safe'], d['summary']
          print(f\"clean OK: score={d['summary']['score']}\")
          "
      - name: vbalidator --roundtrip on Linux falls back gracefully
        run: |
          # Off-Windows the round-trip must emit info VBA_RT000 and exit
          # cleanly when the source is otherwise compile-safe.
          vbalidator tests/samples/valid_code/valid_sample.bas \
            --output /tmp/rt.json --quiet --no-strict --roundtrip
          python -c "
          import json
          d = json.load(open('/tmp/rt.json'))
          assert d['summary']['compile_safe']
          assert any(i.get('rule_id') == 'VBA_RT000' for i in d['issues']), d['issues']
          print('roundtrip fallback OK')
          "

  docs:
    name: Rule docs in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
      - name: Regenerate rule catalogue
        run: python tools/generate_rule_docs.py
      - name: Fail when docs are out of sync
        run: |
          if ! git diff --quiet docs/rules/; then
            echo "::error::docs/rules/ is out of sync with src/rules.py."
            echo "Run \`python tools/generate_rule_docs.py\` and commit the result."
            git --no-pager diff docs/rules/
            exit 1
          fi
