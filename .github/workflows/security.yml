name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly so Dependabot bumps land alongside fresh advisory data.
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write       # required for CodeQL upload

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: Dependency CVE scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit
      - name: Audit installed dependencies
        run: |
          pip-audit \
            --strict \
            --requirement <(python -m pip install --dry-run --report - .[dev] 2>/dev/null \
                              | python -c "import sys,json; d=json.load(sys.stdin); [print(p['metadata']['name']+'=='+p['metadata']['version']) for p in d['install']]") \
            || pip-audit --strict .

  bandit:
    name: Bandit static-security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bandit
        run: pip install --upgrade pip bandit[toml]
      - name: Run bandit
        run: |
          # Skip B311 (random) — VBAlidator does not ship security-sensitive
          # randomness; B404/B603 (subprocess) — only used in tests.
          bandit -r src \
            --skip B311 \
            --severity-level medium \
            -f txt

  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: +security-extended,security-and-quality
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
