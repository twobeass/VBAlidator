name: Dependabot auto-merge

# Auto-merges Dependabot PRs once the required status checks pass, so the
# weekly bumps don't turn into a manual chore now that `main` is protected.
# Scope:
#   - github-actions: all bumps (action version bumps are typically additive).
#   - pip:            non-major bumps only. Major dependency bumps deserve
#                     a human read of the upstream changelog.
# Branch protection still gates the actual merge: this workflow only flips
# the auto-merge flag — GitHub waits for the 8 required checks before
# squashing the PR onto main.

on: pull_request

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for safe bumps
        if: |
          steps.meta.outputs.package-ecosystem == 'github_actions' ||
          (steps.meta.outputs.package-ecosystem == 'pip' && steps.meta.outputs.update-type != 'version-update:semver-major')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
